<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
    <title>Careers-page</title>
</head>

<body>
    <header class="header">
        <div class="container header__container">
            <button class="header__test-button">
                <img class="header__test-button-image" src="./icons/open__burger.svg" alt="open__burger-icon">
            </button>
            <div class="header__left-box">
                <a class="header__logo-link" href="index.html">
                    <img class="header__logo-image" src="./icons/dark_logo.svg" alt="dark__logo" />
                </a>
                <ul class="header__list">
                    <li class="header__lists">
                        <a class="header__links" href="about.html">
                            <p class="header__links-texts">About</p>
                        </a>
                    </li>
                    <li class="header__lists">
                        <a class="header__links" href="location.html">
                            <p class="header__links-texts">Location</p>
                        </a>
                    </li>
                    <li class="header__lists">
                        <a class="header__links" href="#">
                            <p class="header__links-texts online ">Careers</p>
                        </a>
                    </li>
                </ul>
            </div>
            <button class="header__button">Get Scootin</button>
            <div class="header__mb-buttons-box">
                <button class="header__mb-open-burger-button">
                    <img class="header__mb-open-burger-icon" src="./icons/open__burger.svg" alt="open__burger-icon" />
                </button>
                <button class="header__mb-close-burger-button">
                    <img class="header__mb-close-burger-icon" src="./icons/close__burger.svg"
                        alt="close__burger-icon" />
                </button>
            </div>
                 </div>
        <div class="header__mb-div">
            <nav class="header__mb-nav">
                <ul class="header__mb-list">
                    <li class="header__mb-lists">
                        <a class="header__mb-links" href="about.html">
                            <p class="header__mb-links-texts ">About</p>
                        </a>
                    </li>
                    <li class="header__mb-lists">
                        <a class="header__mb-links" href="location.html">
                            <p class="header__mb-links-texts">Location</p>
                        </a>
                    </li>
                    <li class="header__mb-lists">
                        <a class="header__mb-links" href="#">
                            <p class="header__mb-links-texts online ">Careers</p> 
                        </a>
                    </li>
                </ul>
                <button class="header__mb-button">Get Scootin</button>
            </nav>
        </div>
    </header>
    <main>
        <section class="sign">
            <div class="container sign__container">
                <h2 class="sign__title">Sign up and Scoot off today</h2>
                <div class="sign__right-box">
                    <a class="sign__icon-link" href="https://www.apple.com/app-store/" target="_blank"
                        rel="noopener noreferrer">
                        <img class="sign__icon-image" src="./icons/appstore.svg" alt="appstore">
                    </a>
                    <a class="sign__icon-link" href="https://play.google.com/store/games?hl=en" target="_blank"
                        rel="noopener noreferrer">
                        <img class="sign__icon-image" src="./icons/googleplay.svg" alt="googleplay">
                    </a>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container footer__container">
            <div class="footer__left-box">
                <a class="footer__logo-link" href="index.html">
                    <img class="footer__logo-image" src="./icons/white__logo.svg" alt="white__logo">
                </a>
                <ul class="footer__list">
                    <li class="footer__lists">
                        <a class="footer__links" href="./about.html">
                            <p class="footer__links-texts">About</p>
                        </a>
                    </li>
                    <li class="footer__lists">
                        <a class="footer__links" href="location.html">
                            <p class="footer__links-texts">Location</p>
                        </a>
                    </li>
                    <li class="footer__lists">
                        <a class="footer__links" href="#">
                            <p class="footer__links-texts online ">Careers</p>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="footer__right-icon-box">
                <a class="footer__icon-link" href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer">
                    <img class="footer__icon-image" src="./icons/facebook.svg" alt="facebook">
                </a>
                <a class="footer__icon-link" href="https://x.com/" target="_blank" rel="noopener noreferrer">
                    <img class="footer__icon-image" src="./icons/twitter.svg" alt="twitter">
                </a>
                <a class="footer__icon-link" href="https://www.instagram.com/" target="_blank"
                    rel="noopener noreferrer">
                    <img class="footer__icon-image" src="./icons/instagram.svg" alt="instagram">
                </a>
            </div>
        </div>
    </footer>
    <script src="./main.js"></script>
</body>

</html>
